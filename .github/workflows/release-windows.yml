name: release-windows

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'boothy-v*'
  workflow_dispatch:

jobs:
  windows-baseline:
    runs-on: windows-2025
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.77.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate manual draft release ref
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          Write-Error 'workflow_dispatch release proof is only supported from refs/heads/main.'

      - name: Run release baseline governance checks
        run: pnpm test:run src/governance/release-baseline-governance.test.ts

      - name: Run branch rollout safety tests
        working-directory: src-tauri
        run: cargo test --test branch_rollout

      - name: Run unsigned Windows baseline build
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: pwsh
        run: |
          "BOOTHY_WINDOWS_PROOF_PATH=unsigned-baseline" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BOOTHY_WINDOWS_PROOF_OUTCOME=failed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          pnpm build:desktop
          "BOOTHY_WINDOWS_PROOF_OUTCOME=passed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run signing-ready draft build
        if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/boothy-v')
        env:
          BOOTHY_WINDOWS_CERT_BASE64: ${{ secrets.BOOTHY_WINDOWS_CERT_BASE64 }}
          BOOTHY_WINDOWS_CERT_PASSWORD: ${{ secrets.BOOTHY_WINDOWS_CERT_PASSWORD }}
          BOOTHY_WINDOWS_TIMESTAMP_URL: ${{ secrets.BOOTHY_WINDOWS_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          "BOOTHY_WINDOWS_PROOF_PATH=release-draft" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BOOTHY_WINDOWS_PROOF_OUTCOME=failed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          pnpm release:desktop
          "BOOTHY_WINDOWS_PROOF_OUTCOME=passed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Capture release proof summary
        if: always() && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-proof | Out-Null

          $artifactRoot = if (Test-Path 'src-tauri/target/release/bundle') {
            'src-tauri/target/release/bundle/'
          } elseif (Test-Path 'src-tauri/target/debug/bundle') {
            'src-tauri/target/debug/bundle/'
          } else {
            'bundle-not-produced'
          }

          $signingMode = if ($env:BOOTHY_WINDOWS_SIGNING_MODE) {
            $env:BOOTHY_WINDOWS_SIGNING_MODE
          } else {
            'unsigned-baseline'
          }

          $signingSource = if ($env:BOOTHY_WINDOWS_SIGNING_SOURCE) {
            $env:BOOTHY_WINDOWS_SIGNING_SOURCE
          } else {
            'none'
          }

          $proofPath = if ($env:BOOTHY_WINDOWS_PROOF_PATH) {
            $env:BOOTHY_WINDOWS_PROOF_PATH
          } else {
            'not-run'
          }

          $proofOutcome = if ($env:BOOTHY_WINDOWS_PROOF_OUTCOME) {
            $env:BOOTHY_WINDOWS_PROOF_OUTCOME
          } else {
            'not-run'
          }

          $hardwareLedger = '_bmad-output/implementation-artifacts/hardware-validation-ledger.md'
          $hardwareGateStatus = 'ledger-missing'
          $promotionState = 'release-hold'
          $requiredGateStories = @()
          $gateboardStatus = @{}

          if (Test-Path $hardwareLedger) {
            $section = ''

            foreach ($line in Get-Content $hardwareLedger) {
              if ($line -match '^## Canonical Release-Gated Stories') {
                $section = 'required'
                continue
              }

              if ($line -match '^## Sprint Review Gateboard') {
                $section = 'gateboard'
                continue
              }

              if ($line -match '^## ') {
                $section = ''
                continue
              }

              if ($section -eq 'required' -and $line -match '^\|\s*Story\s+([0-9]+\.[0-9]+)\s*\|') {
                $requiredGateStories += $matches[1]
                continue
              }

              if ($section -eq 'gateboard' -and $line -match '^\|\s*([0-9]+\.[0-9]+)\s*\|.*\|\s*(Go|No-Go)\s*\|') {
                $gateboardStatus[$matches[1]] = $matches[2]
              }
            }

            $requiredGateStories = $requiredGateStories | Sort-Object -Unique
            $missingGateStories = @()
            $blockedGateStories = @()

            foreach ($story in $requiredGateStories) {
              if (-not $gateboardStatus.ContainsKey($story)) {
                $missingGateStories += $story
                continue
              }

              if ($gateboardStatus[$story] -ne 'Go') {
                $blockedGateStories += "${story}:$($gateboardStatus[$story])"
              }
            }

            if ($proofOutcome -ne 'passed') {
              $hardwareGateStatus = 'automation-failed-or-skipped'
            } elseif ($requiredGateStories.Count -eq 0) {
              $hardwareGateStatus = 'no-gated-stories-declared'
            } elseif ($missingGateStories.Count -gt 0) {
              $hardwareGateStatus = 'missing-gated-story-rows'
            } elseif ($blockedGateStories.Count -gt 0) {
              $hardwareGateStatus = 'gated-stories-blocked'
            } else {
              $hardwareGateStatus = 'all-gated-stories-go'
              $promotionState = 'operator-review-required'
            }
          } elseif ($proofOutcome -ne 'passed') {
            $hardwareGateStatus = 'automation-failed-or-skipped'
          }

          $summary = @"
          ## Windows release proof
          - Runner baseline: windows-2025
          - Trigger: ${{ github.event_name }}
          - Ref: ${{ github.ref }}
          - Proof path: $proofPath
          - Proof outcome: $proofOutcome
          - Signing mode: $signingMode
          - Signing source: $signingSource
          - Artifact root: $artifactRoot
          - Hardware gate status: $hardwareGateStatus
          - Promotion state: $promotionState
          - Hardware proof ledger: $hardwareLedger
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          $proof = @{
            runner = 'windows-2025'
            trigger = '${{ github.event_name }}'
            ref = '${{ github.ref }}'
            proofPath = $proofPath
            proofOutcome = $proofOutcome
            signingMode = $signingMode
            signingSource = $signingSource
            artifactRoot = $artifactRoot
            hardwareGateStatus = $hardwareGateStatus
            promotionState = $promotionState
            hardwareLedger = $hardwareLedger
          } | ConvertTo-Json -Depth 4

          Set-Content -Path 'release-proof/release-proof.json' -Value $proof

      - name: Upload release proof
        if: always() && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-proof-${{ github.run_id }}
          path: release-proof
          if-no-files-found: error

      - name: Upload Windows bundle outputs
        if: always() && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-${{ github.run_id }}
          path: |
            src-tauri/target/debug/bundle
            src-tauri/target/release/bundle
          if-no-files-found: warn
