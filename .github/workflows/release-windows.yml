name: release-windows

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'boothy-v*'
  workflow_dispatch:

jobs:
  windows-baseline:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run desktop baseline build
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
        run: pnpm build:desktop

      - name: Run signing-ready draft build
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/boothy-v')
        run: pnpm release:desktop
